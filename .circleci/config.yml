version: 2.1

orbs:
  node: circleci/node@5.2.0

executors:
  node-executor:
    docker:
      - image: cimg/node:18.20
    resource_class: medium

jobs:
  install-dependencies:
    executor: node-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
            - v1-dependencies-
      - run:
          name: Install dependencies with optional packages
          command: |
            # Clear npm cache to avoid issues with optional dependencies
            npm cache clean --force
            # Install with explicit optional dependency inclusion
            npm ci --include=optional --verbose
            # Force install the specific rollup platform package if it's still missing
            npm install @rollup/rollup-linux-x64-gnu --save-optional --no-save
      - save_cache:
          paths:
            - ~/.npm
          key: v1-dependencies-{{ checksum "package-lock.json" }}
      - persist_to_workspace:
          root: .
          paths:
            - node_modules

  lint:
    executor: node-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Run ESLint
          command: npm run lint
      - run:
          name: Check Prettier formatting
          command: npm run format:check

  typecheck:
    executor: node-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Run TypeScript type checking
          command: npm run typecheck

  test:
    executor: node-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Create test results directory
          command: mkdir -p test-results
      - run:
          name: Run tests with coverage
          command: npm run test:coverage
      - store_test_results:
          path: ./test-results
      - store_artifacts:
          path: ./test-results
          destination: test-results
      - store_artifacts:
          path: ./coverage
          destination: coverage

  build:
    executor: node-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Build project
          command: npm run build
      - persist_to_workspace:
          root: .
          paths:
            - dist
      - store_artifacts:
          path: ./dist
          destination: dist

  publish:
    executor: node-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Set version from git tag
          command: |
            if [ -z "$CIRCLE_TAG" ]; then
              echo "Error: No git tag found. This job should only run on tagged commits."
              exit 1
            fi
            npm version $CIRCLE_TAG --no-git-tag-version --allow-same-version
      - run:
          name: Authenticate with npm
          command: echo "//registry.npmjs.org/:_authToken=${NPM_AUTH_TOKEN}" > ~/.npmrc
      - run:
          name: Publish to npm
          command: npm publish --access public
  circle-all:
    docker:
      - image: busybox:1.34.1
    resource_class: small
    steps:
      - run:
          command: echo "All required jobs finished successfully"

workflows:
  version: 2

  # Main workflow for all branches and PRs
  build-test-deploy:
    jobs:
      - install-dependencies:
          filters:
            tags:
              only: /.*/

      - lint:
          requires:
            - install-dependencies
          filters:
            tags:
              only: /.*/

      - typecheck:
          requires:
            - install-dependencies
          filters:
            tags:
              only: /.*/

      - test:
          requires:
            - install-dependencies
          filters:
            tags:
              only: /.*/

      - build:
          requires:
            - install-dependencies
            - lint
            - typecheck
            - test
          filters:
            tags:
              only: /.*/

      # Only publish on tagged releases
      - publish:
          requires:
            - build
          filters:
            tags:
              only: /^[0-9]+\.[0-9]+\.[0-9]+.*/
            branches:
              ignore: /.*/
          context: npm-publish
      - circle-all:
          requires:
            - lint
            - test
            - install-dependencies
            - build
            - typecheck
          filters:
            tags:
              only: /.*/
